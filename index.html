
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Ski & Snowboard — Buscador PVP CLP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --green: #6bbf2f;
    --green-dark: #4e9120;
    --green-glow: rgba(107,191,47,0.18);
    --white: #f5f5f0;
    --grey: #1c1c1c;
    --grey2: #2a2a2a;
    --border: #333;
    --text-muted: #888;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--black);
    border-bottom: 2px solid var(--green);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand-logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-logo .word-vertical {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    color: var(--green);
    text-shadow: 0 0 18px var(--green-glow);
  }
  .brand-logo .word-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
    margin-top: -4px;
  }
  .header-title {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .header-count {
    background: var(--green);
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    padding: 2px 10px;
    border-radius: 3px;
    letter-spacing: 1px;
  }

  /* ─── MAIN ─── */
  .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ─── SEARCH ─── */
  .search-panel {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-bottom: 28px;
    align-items: end;
  }
  .search-block { display: flex; flex-direction: column; gap: 6px; }
  .search-block label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .search-input {
    background: var(--grey);
    border: 1.5px solid var(--border);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 17px;
    padding: 12px 18px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .search-input::placeholder { color: #444; }
  .search-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }
  .filters-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .filter-select {
    background: var(--grey);
    border: 1.5px solid var(--border);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    flex: 1;
    min-width: 160px;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--green); }

  .btn-clear {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    align-self: center;
  }
  .btn-clear:hover { border-color: var(--green); color: var(--green); }

  /* ─── STATUS BAR ─── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .status-bar .count-highlight { color: var(--green); font-weight: 700; font-size: 16px; }

  /* ─── RESULTS TABLE ─── */
  .results-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--grey2); }
  th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--green); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  th.active-sort { color: var(--green); }
  th.active-sort .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(107,191,47,0.05); }
  td {
    padding: 11px 16px;
    font-size: 14px;
    vertical-align: middle;
  }
  .td-marca {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .td-codigo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
  }
  .td-desc { font-weight: 500; max-width: 320px; }
  .td-cat .cat-badge {
    background: var(--grey2);
    border: 1px solid var(--border);
    color: #999;
    font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .td-pvp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--green);
    letter-spacing: 1px;
    white-space: nowrap;
    text-align: right;
  }
  .pvp-currency {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--green-dark);
    display: block;
    letter-spacing: 2px;
    text-align: right;
    margin-top: -4px;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-family: 'Barlow Condensed'; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

  /* ─── HIGHLIGHT ─── */
  mark {
    background: rgba(107,191,47,0.28);
    color: var(--green);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    .header { padding: 12px 16px; }
    .main { padding: 20px 12px 40px; }
    .search-panel { grid-template-columns: 1fr; }
    th:nth-child(1), td:nth-child(1) { display: none; }
    .td-pvp { font-size: 18px; }
  }
</style>
</head>

<header class="header">
  <div class="brand-logo">
    <span class="word-vertical">VERTICAL</span>
    <span class="word-sub">Ski &amp; Snowboard</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
    <span class="header-title">Lista PVP · Temporada 25/26</span>

  </div>
</header>

<main class="main">

  <div class="status-bar">

  </div>

  <div class="results-wrap">

      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏔️</div>
      <p>No se encontraron productos</p>
    </div>
  </div>

  <div class="footer">Andean Trade &amp; Investment Chile · Lista actualizada · Ordenado por marca y precio</div>
</main>

// State
let filtered = [...DATA];
let sortCol = null;
let sortDir = 1;

// Populate filters
const marcas = [...new Set(DATA.map(d => d.MARCA))].sort();
const cats = [...new Set(DATA.map(d => d.CATEGORIA))].sort();
const fMarca = document.getElementById('filterMarca');
const fCat = document.getElementById('filterCat');
marcas.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; fMarca.appendChild(o); });
cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; fCat.appendChild(o); });

document.getElementById('totalBadge').textContent = DATA.length + ' SKUs';

function fmt(n) { return '$ ' + n.toLocaleString('es-CL'); }

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  const marca = fMarca.value;
  const cat = fCat.value;

  filtered = DATA.filter(d => {
    const matchQ = !q || d.DESCRIPCION.toUpperCase().includes(q) || d.CODIGO_REF.toUpperCase().includes(q);
    const matchMarca = !marca || d.MARCA === marca;
    const matchCat = !cat || d.CATEGORIA === cat;
    return matchQ && matchMarca && matchCat;
  });

  if (sortCol) {
    filtered.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const raw = q.toLowerCase();

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map(d => `
      <tr>
        <td class="td-marca">${highlight(d.MARCA, raw)}</td>
        <td class="td-codigo">${highlight(d.CODIGO_REF, raw)}</td>
        <td class="td-desc">${highlight(d.DESCRIPCION, raw)}</td>
        <td class="td-cat"><span class="cat-badge">${d.CATEGORIA}</span></td>
        <td class="td-pvp">${fmt(d.PVP_CLP)}<span class="pvp-currency">CLP</span></td>
      </tr>
    `).join('');
  }

  document.getElementById('countResult').textContent = filtered.length;
}

// Events
document.getElementById('searchInput').addEventListener('input', render);
fMarca.addEventListener('change', render);
fCat.addEventListener('change', render);
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  fMarca.value = '';
  fCat.value = '';
  sortCol = null;
  sortDir = 1;
  document.querySelectorAll('th').forEach(t => t.classList.remove('active-sort'));
  render();
});

// Sort
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('th').forEach(t => { t.classList.remove('active-sort'); t.querySelector('.sort-icon').textContent = '▲'; });
    th.classList.add('active-sort');
    th.querySelector('.sort-icon').textContent = sortDir === 1 ? '▲' : '▼';
    render();
  });
});

render();
</script>
